      LANGCHAIN4J_OLLAMA_EMBEDDING_LOG_RESPONSES: ${LANGCHAIN4J_OLLAMA_EMBEDDING_LOG_RESPONSES}
      LANGCHAIN4J_OLLAMA_EMBEDDING_TIMEOUT: ${LANGCHAIN4J_OLLAMA_EMBEDDING_TIMEOUT}
      LANGCHAIN4J_OLLAMA_EMBEDDING_MAX_RETRIES: ${LANGCHAIN4J_OLLAMA_EMBEDDING_MAX_RETRIES}

      RERANKER_BASE_URL: ${RERANKER_BASE_URL}

      LANGCHAIN4J_CHAT_MEMORY_MAX_MESSAGES: ${LANGCHAIN4J_CHAT_MEMORY_MAX_MESSAGES}

      # --- LangChain4j (Search - Tavily) ---
      LANGCHAIN4J_WEB_SEARCH_ENGINE_TAVILY_MCP_SERVER_URL: ${LANGCHAIN4J_WEB_SEARCH_ENGINE_TAVILY_MCP_SERVER_URL}
      LANGCHAIN4J_TAVILY_API_KEY: ${LANGCHAIN4J_TAVILY_API_KEY}
      LANGCHAIN4J_WEB_SEARCH_ENGINE_TAVILY_MAX_RESULTS: ${LANGCHAIN4J_WEB_SEARCH_ENGINE_TAVILY_MAX_RESULTS}

      # --- Milvus ---
      MILVUS_HOST: ${MILVUS_HOST}
      MILVUS_PORT: ${MILVUS_PORT}
      MILVUS_TOKEN: ${MILVUS_TOKEN}
      MILVUS_DATABASE: ${MILVUS_DATABASE}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION}
      MILVUS_DIMENSION: ${MILVUS_DIMENSION}

      # --- MinIO ---
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_FILES: ${MINIO_BUCKET_FILES}

      # --- JWT / Security ---
      USER_PASSWORD_LENGTH: ${USER_PASSWORD_LENGTH}
      JWT_ACCESS_EXPIRE: ${JWT_ACCESS_EXPIRE}
      JWT_REFRESH_EXPIRE: ${JWT_REFRESH_EXPIRE}
      JWT_SECURITY: ${JWT_SECURITY}

    deploy:
      resources:
        limits:
          memory: 32G        # 限制容器最大使用 32G 内存
        reservations:
          memory: 8G         # 启动时最少预留 8G 内存

    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    depends_on:
      - gd-cors-mysql
      - gd-cors-redis
      - gd-cors-rabbitmq
      - gd-cors-milvus-etcd
      - gd-cors-milvus
      - gd-cors-minio



  # ================================
  # 前端服务 Vue3 + Nginx
  # ================================
  gd-cors-web:
    build:
      context: ./web-gd-cors
      dockerfile: Dockerfile
    image: gd-cors-web:latest
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - gd-cors-network
    restart: unless-stopped
    logging:
      driver: "local"
      options:
        max-size: "5m"
        max-file: "3"
        compress: "true"



# ============================================
# 存储卷配置说明
# ============================================
# 所有存储均使用 Bind Mount（绑定挂载），不再使用 Named Volume
#
# 存储路径配置：
# - 通过环境变量 STORAGE_PATH_1 配置存储路径前缀
# - 默认值：/data/gd-cors
# - 可在 .env 文件中设置，或在命令行中 export
#
# 存储目录结构（宿主机，默认 /data/gd-cors/）：
# ${STORAGE_PATH_1:-/data/gd-cors}/
#   ├── mysql/
#   │   └── logs/   # MySQL 日志目录
#   ├── redis/
#   │   └── logs/   # Redis 日志目录
#   ├── rabbitmq/
#   │   └── logs/   # RabbitMQ 日志目录
#   ├── logs/       # 应用日志目录（如果启用应用服务）
#   └── files/      # 用户上传文件目录（如果启用应用服务）
#
# 部署前准备：
# 1. 设置存储路径（可选，使用默认值可跳过）：
#    # 方式1：在 .env 文件中设置（推荐）
#    echo "STORAGE_PATH_1=/data/gd-cors" > .env
#    # 方式2：在命令行中设置
#    export STORAGE_PATH_1=/data/gd-cors
# 2. 创建存储目录（使用环境变量或默认路径）：
#    STORAGE_PATH_1=${STORAGE_PATH_1:-/data/gd-cors}
#    sudo mkdir -p ${STORAGE_PATH_1}/{mysql/logs,redis/logs,rabbitmq/logs,logs,files}
# 3. 设置目录权限（根据容器用户ID调整，通常为 1000:1000）：
#    sudo chown -R 1000:1000 ${STORAGE_PATH_1}
# 4. 确保存储目录有足够空间（建议使用独立数据盘）
#
# 使用示例：
# - 默认路径：/data/gd-cors
# - 自定义路径：export STORAGE_PATH_1=/mnt/data/gd-cors
# - 独立数据盘：export STORAGE_PATH_1=/data-disk/gd-cors
# ============================================

networks:
  gd-cors-network:
    driver: bridge

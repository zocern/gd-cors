      LANGCHAIN4J_OPENAI_ONLINE_MODEL_ZHIPU_API_KEY: ${LANGCHAIN4J_OPENAI_ONLINE_MODEL_ZHIPU_API_KEY}
      LANGCHAIN4J_OPENAI_ONLINE_LOG_REQUESTS: ${LANGCHAIN4J_OPENAI_ONLINE_LOG_REQUESTS}
      LANGCHAIN4J_OPENAI_ONLINE_LOG_RESPONSES: ${LANGCHAIN4J_OPENAI_ONLINE_LOG_RESPONSES}
      LANGCHAIN4J_OPENAI_ONLINE_TIMEOUT: ${LANGCHAIN4J_OPENAI_ONLINE_TIMEOUT}


      # --- LangChain4j (Local - Ollama) ---
      LANGCHAIN4J_OLLAMA_CHAT_BASE_URL: ${LANGCHAIN4J_OLLAMA_CHAT_BASE_URL}
      LANGCHAIN4J_OLLAMA_CHAT_MODEL_NAME: ${LANGCHAIN4J_OLLAMA_CHAT_MODEL_NAME}
      LANGCHAIN4J_OLLAMA_CHAT_LOG_REQUESTS: ${LANGCHAIN4J_OLLAMA_CHAT_LOG_REQUESTS}
      LANGCHAIN4J_OLLAMA_CHAT_LOG_RESPONSES: ${LANGCHAIN4J_OLLAMA_CHAT_LOG_RESPONSES}
      LANGCHAIN4J_OLLAMA_CHAT_TIMEOUT: ${LANGCHAIN4J_OLLAMA_CHAT_TIMEOUT}

      LANGCHAIN4J_OLLAMA_VL_BASE_URL: ${LANGCHAIN4J_OLLAMA_VL_BASE_URL}
      LANGCHAIN4J_OLLAMA_VL_MODEL_NAME: ${LANGCHAIN4J_OLLAMA_VL_MODEL_NAME}
      LANGCHAIN4J_OLLAMA_VL_TEMPERATURE: ${LANGCHAIN4J_OLLAMA_VL_TEMPERATURE}
      LANGCHAIN4J_OLLAMA_VL_LOG_REQUESTS: ${LANGCHAIN4J_OLLAMA_VL_LOG_REQUESTS}
      LANGCHAIN4J_OLLAMA_VL_LOG_RESPONSES: ${LANGCHAIN4J_OLLAMA_VL_LOG_RESPONSES}
      LANGCHAIN4J_OLLAMA_VL_TIMEOUT: ${LANGCHAIN4J_OLLAMA_VL_TIMEOUT}
      LANGCHAIN4J_OLLAMA_VL_MAX_RETRIES: ${LANGCHAIN4J_OLLAMA_VL_MAX_RETRIES}

      # --- LangChain4j (Embedding) ---
      LANGCHAIN4J_OLLAMA_EMBEDDING_BASE_URL: ${LANGCHAIN4J_OLLAMA_EMBEDDING_BASE_URL}
      LANGCHAIN4J_OLLAMA_EMBEDDING_MODEL_NAME: ${LANGCHAIN4J_OLLAMA_EMBEDDING_MODEL_NAME}

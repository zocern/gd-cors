    environment:
      # --- Server ---
      SERVER_PORT: ${SERVER_PORT}
      SERVER_SERVLET_CONTEXT_PATH: ${SERVER_SERVLET_CONTEXT_PATH}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SERVLET_MULTIPART_MAX_FILE_SIZE: ${SERVLET_MULTIPART_MAX_FILE_SIZE}
      SERVLET_MULTIPART_MAX_REQUEST_SIZE: ${SERVLET_MULTIPART_MAX_REQUEST_SIZE}

      # --- Redis ---
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DATABASE: ${REDIS_DATABASE}
      REDIS_CONNECT_TIMEOUT: ${REDIS_CONNECT_TIMEOUT}

      # --- MySQL ---
      DATASOURCE_HOST: ${DATASOURCE_HOST}
      DATASOURCE_PORT: ${DATASOURCE_PORT}
      DATASOURCE_DATABASE: ${DATASOURCE_DATABASE}
      DATASOURCE_USERNAME: ${DATASOURCE_USERNAME}
      DATASOURCE_PASSWORD: ${DATASOURCE_PASSWORD}
      SQL_INIT_MODE: ${SQL_INIT_MODE}
      THREAD_POOL_CORE_SIZE: ${THREAD_POOL_CORE_SIZE}

      # --- RabbitMQ ---
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: ${RABBITMQ_PORT}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      RABBITMQ_CONSUMER_CONCURRENCY: ${RABBITMQ_CONSUMER_CONCURRENCY}
